<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>포트폴리오 실험 페이지</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <header class="hero">
        <div class="container">
            <section class="panel hero-main">
                <span class="eyebrow">GAME DEVELOPER PORTFOLIO</span>
                <h1>
                    4개의 프로젝트를 만든<br />
                    주니어 게임 개발자
                </h1>
                <p>
                    Unity 기반으로 게임플레이, UI, 시스템 구현을 중심으로 작업하고 있는
                    개발자 포트폴리오 실험 페이지입니다.
                    아래 프로젝트 카드를 클릭하면 같은 페이지 안에서 상세 내용이 변경됩니다.
                </p>
            </section>
        </div>
    </header>

    <main id="projects" class="section">
        <div class="container">
            <h2 class="section-title">Selected Projects</h2>
            <p class="section-desc">
                프로젝트 카드를 선택하면 아래 상세 영역 내용이 교체됩니다.
            </p>

            <section class="project-card-row" id="projectList"></section>

            <section class="panel project-detail" id="projectDetail"></section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            Experimental portfolio page
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
